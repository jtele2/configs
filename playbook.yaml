- name: Setup EC2 dev instances for CMMC Compliance
  # Tychon tester node on us-east-2
  hosts: localhost
  tasks:
    - name: Install apt packages
      ansible.builtin.apt:
        pkg:
        - jq
        - zsh
        - trash-cli
        - gnupg
        - software-properties-common
        - apt-transport-https
        - ca-certificates
        - curl 
        - gnupg  
        - lsb-release 
        state: present
        update_cache: yes
      become: yes
      tags: 
      - test
    - name: Check if AWS CLI installed
      ansible.builtin.shell: aws --version
      register: aws_installed
      ignore_errors: yes
    - name: Download the AWS CLI
      ansible.builtin.unarchive:
        src: https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip
        dest: /tmp
        remote_src: yes
      when: aws_installed.rc != 0
    - name: Install the AWS CLI
      ansible.builtin.shell: /tmp/aws/install
      when: aws_installed.rc != 0
      become: yes
