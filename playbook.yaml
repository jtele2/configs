    - name: Create a symbolic link for .zshrc
      ansible.builtin.file:
        src: /home/ubuntu/configs/.zshrc
        dest: /home/ubuntu/.zshrc
        owner: ubuntu
        group: ubuntu
        state: link
        force: yes
      tags: 
      - zsh-post-install
    - name: Create a symbolic link for functions.zsh
      ansible.builtin.file:
        src: /home/ubuntu/configs/functions.zsh
        dest: /home/ubuntu/.oh-my-zsh/custom/functions.zsh
        owner: ubuntu
        group: ubuntu
        state: link
        force: yes
      tags: 
      - zsh-post-install
    - name: Create a symbolic link for aliases.zsh
      ansible.builtin.file:
        src: /home/ubuntu/configs/aliases.zsh
        dest: /home/ubuntu/.oh-my-zsh/custom/aliases.zsh
        owner: ubuntu
        group: ubuntu
        state: link
        force: yes
      tags: 
      - zsh-post-install
    - name: Create a symbolic link for aliases.zsh
      ansible.builtin.file:
        src: /home/ubuntu/configs/.vimrc
        dest: /home/ubuntu/.vimrc
        owner: ubuntu
        group: ubuntu
        state: link
        force: yes
      tags: 
      - zsh-post-install